<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Birthday</title>
    <style> 
      @import url('https://fonts.googleapis.com/css2?family=Coiny&family=Titan+One&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Nerko+One&family=Sriracha&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap');
* {
  padding: 0;
  margin: 0;
  box-sizing: border-box;
}
:root {
  --color-pink: #feecea;
  --color-white: #fff;
  --color-black: #333;
  --color-text-pink: #ff7882;
  --color-heart: #f61f1f;
  --color-bg-letter: #fff8e4;
  --color-border: #daccbf;
}
html {
  height: 100%;
}
body {
  position: relative;
  font-size: 16px;
  margin: 0;
  padding: 0;
  height: 100%;
  background-image: linear-gradient(var(--color-pink), var(--color-pink));
}
#wrapper {
  position: relative;
  background-color: transparent;
  background-image: linear-gradient(
      0deg,
      transparent 24%,
      rgba(255, 255, 255, 1) 25%,
      rgba(255, 255, 255, 1) 26%,
      transparent 27%,
      transparent 74%,
      rgba(255, 255, 255, 1) 75%,
      rgba(255, 255, 255, 1) 76%,
      transparent 77%,
      transparent
    ),
    linear-gradient(
      90deg,
      transparent 24%,
      rgba(255, 255, 255, 1) 25%,
      rgba(255, 255, 255, 1) 26%,
      transparent 27%,
      transparent 74%,
      rgba(255, 255, 255, 1) 75%,
      rgba(255, 255, 255, 1) 76%,
      transparent 77%,
      transparent
    );
  height: 100%;
  background-size: 80px 80px;
  overflow: hidden;
  z-index: 1;
}
.flag__birthday {
  display: flex;
  justify-content: space-between;
  transform: translateY(-200px);
  animation: translateYFlag 0.75s 1s forwards;
}
@keyframes translateYFlag {
  to {
    transform: translateY(-10px);
  }
}
.song {
    display: none;
}
.flag__birthday .flag__left {
  transform: rotate(-10deg) translate(-20px, 30px);
}
.flag__birthday .flag__right {
  transform: rotate(10deg) translate(20px, 30px) scaleX(-1);
}
.content {
  width: 100%;
  position: relative;
  display: flex;
  padding-top: 3rem;
}
.content .left,
.content .right {
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
.content .left {
  width: 40%;
  margin-left: 50px;
}
.content .right {
  width: 60%;
}
.left .btn {
  transform: scale(0);
  animation: scaleCricle 0.5s 4s forwards ease-in-out;
}
#btn__letter {
  position: relative;
  margin-top: 30px;
  background-color: var(--color-text-pink);
  outline: none;
  padding: 5px 15px;
  font-size: 1rem;
  border-radius: 50px;
  border: 3px solid var(--color-black);
  font-family: 'Sriracha', cursive;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 2;
  transform: scale(1);
  transition: all 0.5s ease-in-out;
}
#btn__letter:active {
  transform: scale(0.7);
}
#btn__letter i {
  margin-left: 5px;
}
#btn__letter:hover {
  border-color: var(--color-heart);
  background-color: var(--color-heart);
  color: #fff;
  box-shadow: rgba(0, 0, 0, 0.24) 0px 3px 8px;
}

#btn__letter:hover i {
  animation: rotateHeart 1s infinite linear;
}
@keyframes rotateHeart {
  0%,
  50%,
  100% {
    transform: rotate(0deg);
  }
  25% {
    transform: rotate(12deg);
  }
  75% {
    transform: rotate(-12deg);
  }
}
.title {
  position: relative;
  width: 100%;
  display: flex;
  justify-content: center;
  font-family: 'Titan One', sans-serif;
  font-size: 3rem;
  flex-direction: column;
  perspective: 1000px;
}
.title .happy,
.title .birthday {
  position: relative;
  text-shadow: 4px 4px var(--color-black), -4px 4px var(--color-black),
    4px -4px var(--color-black), -4px -4px var(--color-black),
    4px 8px 0 var(--color-black);
  font-weight: bold;
  display: flex;
  justify-content: center;
}
.title .happy {
  color: var(--color-white);
}
.title .happy span,
.title .birthday span {
  transform: translateY(50px);
  opacity: 0;
  visibility: hidden;
  animation: txtTranslateY 0.25s var(--t) forwards;
}
@keyframes txtTranslateY {
  100% {
    transform: translateY(0);
    opacity: 1;
    visibility: visible;
  }
}
.title .birthday {
  color: var(--color-text-pink);
}

.title .hat { 
  position: absolute;
  right: 45px;
  top: -350px;
  transform: rotate(-40deg);
  z-index: -1;
  animation: topHat 2s 6s forwards ease;
}
@keyframes topHat {
  20%,
  30% {
    top: -30px;
    transform-origin: left;
    transform: rotate(-40deg);
  }
  35%,
  100% {
    top: -30px;
    transform: rotate(0deg);
  }
}
.date__of__birth,
.name {
  display: flex;
  justify-content: space-around;
  align-items: center;
  background-color: var(--color-text-pink);
  border-radius: 50px;
  margin-top: 20px;
  font-family: 'Sriracha', cursive;
}
.date__of__birth {
  border: 3px solid var(--color-black);
  position: relative;
  transform: translateY(-100px);
  z-index: -1;
  opacity: 0;
  visibility: hidden;
  width: 0px;
  animation: dateOfBirth 2.5s 4.5s forwards;
}
@keyframes dateOfBirth {
  20%,
  40% {
    width: 0px;
    height: 0;
    transform: translateY(0px);
    opacity: 1;
    visibility: visible;
  }
  45% {
    transform: translateY(0px);
    opacity: 1;
    visibility: visible;
    width: 300px;
    height: 0px;
  }
  50%,
  100% {
    transform: translateY(0px);
    opacity: 1;
    visibility: visible;
    width: 300px;
    height: 50px;
  }
}
.name {
  position: absolute;
  padding: 0px 40px;
  bottom: -20px;
  border: 3px solid var(--color-black);
}
.date__of__birth span,
.name span {
  font-weight: bold;
  margin: 0px 40px;
}
.date__of__birth span {
  font-size: 1.2rem;
}
.name span {
  font-size: 1.7rem;
}
.right .box__account {
  position: relative;
  transform: translateY(1000px);
  animation: topBoxImage 2s 4.6s forwards ease-in;
}
@keyframes topBoxImage {
  to {
    transform: translateY(0);
  }
}
.yt-music-box {
    width: 1px;
    height: 1px;
    overflow: hidden;
    position: fixed;
    bottom: 0;
    right: 0;
    z-index: -1;
  }
.content .right .image {
  position: relative;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  overflow: hidden;
  display: flex;
  align-items: center;
  border: 6px solid var(--color-black);
}
.content .right .image img {
  width: 100%;
  object-fit: cover;
}
.cricle {
  position: absolute;
  top: 20px;
  right: 50px;
  display: flex;
  justify-content: center;
  align-items: center;
  transform: scale(0);
  animation: scaleCricle 0.5s 4s forwards ease-in;
}
@keyframes scaleCricle {
  0% {
    transform: scale(0);
  }
  10% {
    transform: scale(1.3);
  }
  20% {
    transform: scale(0.7);
  }
  30%,
  100% {
    transform: scale(1);
  }
}

@keyframes rotateCricle {
  to {
    transform: rotate(360deg);
  }
}
.text__cricle span {
  top: 0%;
  left: 50%;
  position: absolute;
  color: var(--color-black);
  transform: rotate(calc(var(--i) * 24deg));
  transform-origin: 0 45px;
  font-family: 'Sriracha', cursive;
  text-transform: uppercase;
  font-size: 0.7rem;
}
.fa-heart {
  color: var(--color-heart);
  filter: drop-shadow(0 0 3px var(--color-heart));
  animation: scaleHeart 1s infinite linear;
}
.cricle .fa-heart {
  position: absolute;
  transform: scale(0.85);
}
@keyframes scaleHeart {
  50% {
    transform: scale(1.2);
  }
}
.right .balloon_one {
  position: absolute;
  top: -70px;
  left: -70px;
  animation: balloon1 2s infinite linear;
}
@keyframes balloon1 {
  0%,
  50%,
  100% {
    transform-origin: bottom right;
    transform: rotate(0deg);
  }
  25% {
    transform-origin: bottom right;
    transform: rotate(3deg);
  }
  75% {
    transform-origin: bottom right;
    transform: rotate(-3deg);
  }
}
.right .balloon_two {
  position: absolute;
  top: 170px;
  right: -65px;
  z-index: -1;
  transform: rotate(10deg);
  animation: balloon2 2s infinite linear;
}
@keyframes balloon2 {
  0%,
  50%,
  100% {
    transform-origin: bottom left;
    transform: rotate(10deg);
  }
  25% {
    transform-origin: bottom left;
    transform: rotate(7deg);
  }
  75% {
    transform-origin: bottom left;
    transform: rotate(13deg);
  }
}

.decorate_star {
  position: absolute;
  transform: scale(0);
  background-color: var(--color-black);
  clip-path: polygon(
    0 50%,
    35% 35%,
    50% 0,
    65% 35%,
    100% 50%,
    65% 65%,
    50% 100%,
    35% 65%
  );
  animation: scaleCricle 3s var(--t) forwards,
    scaleStar 2s 16s infinite ease-in-out;
}
.decorate_star.star1 {
  width: 20px;
  height: 20px;
  top: 75px;
  left: 300px;
}
.decorate_star.star2 {
  width: 15px;
  height: 20px;
  top: 35px;
  right: 360px;
}
.decorate_star.star3 {
  width: 14px;
  height: 14px;
  top: 290px;
  left: 630px;
}
.decorate_star.star4 {
  width: 18px;
  height: 18px;
  bottom: 60px;
  left: 35px;
}
.decorate_star.star5 {
  width: 16px;
  height: 18px;
  bottom: 140px;
  left: 500px;
}
@keyframes scaleStar {
  25% {
    transform: scale(0.8);
  }
  50% {
    transform: scale(1.1);
  }
}
.decorate_bottom {
  position: absolute;
  right: 0;
  bottom: -10px;
}
.decorate_flower--one {
  position: absolute;
  top: 250px;
  left: 50px;
  transform: scale(0);
  animation: scaleCricle 3s var(--t) forwards ease-in-out;
}
.decorate_flower--two {
  position: absolute;
  top: 225px;
  left: 540px;
  transform: scale(0);
  animation: scaleCricle 3s var(--t) forwards ease-in-out;
}
.decorate_flower--three {
  position: absolute;
  top: 150px;
  right: 235px;
  transform: scale(0);
  animation: scaleCricle 3s var(--t) forwards ease-in-out;
}

.box__letter {
  position: fixed;
  top: 0;
  left: 0;
  background-color: rgba(0, 0, 0, 0.5);
  width: 100%;
  height: 100%;
  z-index: 10;
  display: none;
}
.box__letter .letter__border {
  position: absolute;
  width: 55vw;
  height: 450px;
  background-color: var(--color-white);
  border-radius: 27px;
  padding: 17px;
  box-shadow: rgba(0, 0, 0, 0.24) 0px 3px 8px;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: none;
}
.letter__border .close {
  position: absolute;
  right: -10px;
  top: -10px;
  width: 30px;
  height: 30px;
  background-color: var(--color-white);
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  box-shadow: rgba(99, 99, 99, 0.2) 0px 2px 8px 0px;
  cursor: pointer;
}
.letter__border .letter {
  width: 100%;
  height: 100%;
  background-color: var(--color-bg-letter);
  border-radius: 10px;
  padding-top: 15px;
}
.letter__border .letter .title__letter {
  text-align: center;
  font-family: 'Dancing Script', cursive;
  font-weight: bold;
  font-size: 2.4rem;
}
.title__letter .fa-solid {
  margin-left: 5px;
  font-size: 1.3rem;
}
.letter__border .letter .content__letter {
  position: relative;
  width: 100%;
  height: 100%;
  display: flex;
  padding-top: 1.5rem;
  padding-bottom: 70px;
}
.letter__border .letter .content__letter .left {
  position: relative;
  width: 50%;
  height: 100%;
  padding: 1.7rem;
  border-right: 3px solid var(--color-border);
}
.content__letter .left #heart__letter {
  opacity: 0;
  width: 100%;
}
#heart__letter.animationOp {
  animation: opacityHeart 1s 1s forwards;
}
@keyframes opacityHeart {
  to {
    opacity: 1;
  }
}
.content__letter .left .heart {
  position: absolute;
  opacity: 0;
}
.content__letter .left .heart.animation {
  animation: scaleHeartLetter 1s var(--t) infinite ease-in-out;
}
@keyframes scaleHeartLetter {
  0% {
    opacity: 1;
    transform: scale(0);
  }
  10% {
    opacity: 1;
    transform: scale(1.3);
  }
  20% {
    opacity: 1;
    transform: scale(0.7);
  }
  30%,
  100% {
    opacity: 1;
    transform: scale(1);
  }
}

.content__letter .left .heart_1 {
  top: 90px;
  left: 30px;
}
.content__letter .left .heart_2 {
  top: 20px;
  right: 70px;
}
.content__letter .left .heart_3 {
  bottom: 50px;
  left: 145px;
}
.content__letter .left .heart_4 {
  top: 140px;
  right: 35px;
}
.content__letter .right {
  position: relative;
  width: 50%;
}
.content__letter .right .love__img {
  opacity: 0;
  position: absolute;
  right: 20px;
  top: -100px;
}
.love__img.animationOp {
  animation: opacityHeart 1s 1s forwards;
}
.content__letter .right .text__letter {
  margin-top: 60px;
  padding: 20px 15px 10px 15px;
  font-family: 'Dancing Script', cursive;
  font-size: 1.3rem;
}
.content__letter .right #mewmew {
  position: absolute;
  bottom: 0;
  right: 0;
  opacity: 0;
}
#mewmew.animationOp {
  animation: opacityHeart 1s 1s forwards;
}

/* CSS CHO NÚT "THƯ" BÊN DƯỚI */
.btn__thu {
  display: flex;
  justify-content: space-around;
  align-items: center;
  background-color: var(--color-text-pink);
  border-radius: 50px;
  margin-top: 20px;
  font-family: 'Sriracha', cursive;
  border: 3px solid var(--color-black);
  text-decoration: none;
  color: var(--color-black);
  overflow: hidden;
  
  /* Cài đặt ẩn ban đầu */
  opacity: 0;
  visibility: hidden;
  width: 0px;
  height: 0px;
  
  /* Chờ 7.5s (sau khi chữ ngày sinh gõ xong) mới bắt đầu chạy hiệu ứng */
  animation: showBtnThu 2s 7.5s forwards;
  transition: background-color 0.3s ease, color 0.3s ease;
}

.btn__thu span {
  font-weight: bold;
  font-size: 1.2rem;
  margin: 0px 40px;
  white-space: nowrap;
}

.btn__thu i {
  font-size: 1.2rem;
}

/* Hiệu ứng khi di chuột vào nút */
.btn__thu:hover {
  background-color: var(--color-heart);
  color: var(--color-white);
  box-shadow: rgba(0, 0, 0, 0.24) 0px 3px 8px;
}

/* Hiệu ứng xuất hiện giống với ô ngày sinh */
@keyframes showBtnThu {
  20%,
  40% {
    width: 0px;
    height: 0px;
    opacity: 1;
    visibility: visible;
  }
  45% {
    width: 300px;
    height: 0px;
    opacity: 1;
    visibility: visible;
  }
  50%,
  100% {
    width: 300px;
    height: 50px;
    opacity: 1;
    visibility: visible;
  }
}

@media (max-width: 965px) {
  .content {
    flex-direction: column;
  }
  .content .left,
  .content .right {
    width: 100%;
    margin-left: unset;
  }
  .content .right .image {
    width: 300px;
    height: 300px;
  }

  .title .hat {
    display: none;
  }
  .right .box__account {
    margin-top: 80px;
  }
}

@media (max-width: 480px) {
  .title {
    font-size: 2rem;
  }
  .content .right .image {
    width: 200px;
    height: 200px;
  }
  .content .left {
    margin-left: unset;
  }
  .title .hat {
    display: none;
  }
  .date__of__birth {
    margin-top: 30px;
  }
  .right .balloon_two {display: none;}
  .name{width: max-content;}
  
  /* Căn chỉnh lại nút Thư trên mobile */
  .btn__thu {
    margin-top: 20px;
  }
  @keyframes showBtnThu {
    20%, 40% { width: 0px; height: 0px; opacity: 1; visibility: visible; }
    45% { width: 200px; height: 0px; opacity: 1; visibility: visible; }
    50%, 100% { width: 200px; height: 50px; opacity: 1; visibility: visible; }
  }
  .btn__thu span { margin: 0px 20px; }
}
