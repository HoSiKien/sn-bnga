<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.2/jquery.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.1/js/bootstrap.min.js"></script>
<script src="effect.js"></script>

<script>
$(window).on('load', function() {
    setTimeout(function() {
        // 1. Xử lý logic khi bấm nút "Tắt đèn & Thổi nến"
        $('#light_candle').off('click').on('click', function() {
            $(this).fadeOut('slow');

            $('body').removeClass('peach peach-after').css({
                'background-color': '#0d0d0d',
                'transition': 'background-color 2s ease'
            });

            $('#real-cake').css({
                'filter': 'drop-shadow(0px 0px 30px rgba(255, 153, 51, 0.9)) brightness(1.2)',
                'transition': 'all 1.5s ease'
            });

            if ($('#blow_status').length === 0) {
                $('body').append('<div id="blow_status" style="color: #fff; text-align: center; position: fixed; bottom: 120px; width: 100%; font-family: \'Signika\', sans-serif; font-size: 26px; z-index: 9999; text-shadow: 2px 2px 4px #000;">Ghé sát mic và thổi nến đi nào! 🎂💨</div>');
            } else {
                $('#blow_status').html("Ghé sát mic và thổi nến đi nào! 🎂💨").fadeIn();
            }

            startMicForBlowing();
        });

        // 2. Xử lý logic CHUYỂN TRANG khi bấm nút cuối cùng "A mesage for you"
        $('#story').off('click').on('click', function() {
            // Chuyển hướng sang file HappyBirthday.html nằm cùng thư mục
            window.location.href = "HappyBirthday.html";
        });

    }, 500); 

    function startMicForBlowing() {
        let isBlowing = false;
        const BLOW_THRESHOLD = 45; 

        navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const analyser = audioContext.createAnalyser();
            const microphone = audioContext.createMediaStreamSource(stream);
            
            microphone.connect(analyser);
            analyser.fftSize = 256;
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            function detect() {
                if (isBlowing) return;
                analyser.getByteFrequencyData(dataArray);
                
                let sum = 0;
                for (let i = 0; i < bufferLength; i++) {
                    sum += dataArray[i];
                }
                let averageVolume = sum / bufferLength;

                if (averageVolume > BLOW_THRESHOLD) {
                    isBlowing = true;
                    stream.getTracks().forEach(track => track.stop());
                    extinguishCandle();
                } else {
                    requestAnimationFrame(detect);
                }
            }
            detect();
        }).catch(err => {
            console.error("Lỗi mic:", err);
            $('#blow_status').text("Không mở được Mic! Nhớ chạy qua Live Server nhé.");
        });
    }

    function extinguishCandle() {
        $('#real-cake').css({
            'filter': 'brightness(0.5)',
            'transition': 'all 0.5s ease'
        });
        
        $('#blow_status').text("Phùuuu... Thổi nến thành công rồi! 🎉").fadeOut(2500);

        setTimeout(function() {
            $('body').css('background-color', '').addClass('peach-after');
            
            $('#real-cake').css({
                'filter': 'brightness(1)',
                'transition': 'all 1s ease'
            });

            $('#wish_message').fadeIn('slow');
        }, 1500);
    }
});
</script>
